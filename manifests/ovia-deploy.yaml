apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: ovia-deploy
  name: ovia-deploy
  namespace: devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ovia-deploy
  template:
    metadata:
      labels:
        app: ovia-deploy
    spec:
      containers:
        - image: ojpascale/devops-python:c3b757c138e0aaade9bcef188e343e99b68e4c0d
          name: devops-python
