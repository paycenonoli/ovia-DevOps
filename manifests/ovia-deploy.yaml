apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: ovia-deploy
  name: ovia-deploy
  namespace: devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ovia-deploy
  template:
    metadata:
      labels:
        app: ovia-deploy
    spec:
      containers:
        - image: ojpascale/devops-python:9901524d724b0b2196ac3ce367181969b91ba70f
          name: devops-python
