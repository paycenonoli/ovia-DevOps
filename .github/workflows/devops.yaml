# Developing GitHub Actions Workflow for CI/CD

name: DevOps CICD Pipeline

on: 
  push:
    branches:
      - main
    paths-ignore:
      - ./manifests
permissions:
  contents: write

jobs:
  devops-ci:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2
    - name: Docker Login
      uses: docker/login-action@v4.0.0
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    - name: Build and push Docker images
      uses: docker/build-push-action@v7.0.0
      with:
        file: ./Dockerfile
        tags: ojpascale/devops-python:${{ github.sha }}
        push: true
    - name: Update Image Tag In Manifest File
      run: |
        pip install yq
        yq -Yi '.spec.template.spec.containers[0].image = "ojpascale/devops-python:${{ github.sha }}"' ./manifests/ovia-deploy.yaml

    - name: Commit and Push Code
      run: |
        git config --global user.name "Priest"
        git config --global user.email "paycenonoli@yahoo.com"
        git commit -am "Updating image tag in manifest using Actions"
        git pull --rebase origin main
        git push origin main
  
  devops-cd:
    needs: devops-ci
    runs-on: [arc-runner-set]

    steps:
    - name: Installing ArgoCD CLI on Runner
      run: |
         curl -sSL -o argocd \
         https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
         chmod +x argocd
         sudo mv argocd /usr/local/bin/

    - name: Login via ArgoCD CLI
      run: |
        argocd login localhost:8080 --username admin --password ${{ secrets.ARGOCD_PASSWORD }} --insecure

    - name: Syncing argocd application
      run: |
       argocd app sync ovia-devops-app
